name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows MSVC
            os: windows-latest
            cmake_configure_args: -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl

          - name: Windows Clang
            os: windows-latest
            cmake_configure_args: -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl

          - name: macOS Universal
            os: macos-26
            cmake_configure_args: >
              -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
              -DCMAKE_OSX_DEPLOYMENT_TARGET=10.13

          - name: Linux Clang
            os: ubuntu-latest
            cmake_configure_args: -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++

          - name: Linux GCC
            os: ubuntu-latest
            cmake_configure_args: -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++

          - name: iOS
            os: macos-26
            generator: Xcode
            cmake_configure_args: >
              -DCMAKE_SYSTEM_NAME=iOS
              -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0
            cmake_build_args: --config Release -- -sdk iphonesimulator
            ios_build_only: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: >
          cmake -B build
          -G ${{ matrix.generator || 'Ninja' }}
          ${{ matrix.generator == 'Xcode' && ' ' || '-DCMAKE_BUILD_TYPE=Release' }}
          ${{ matrix.cmake_configure_args }}

      - name: Build
        run: cmake --build build ${{ matrix.cmake_build_args }}

      # iOS is a build-only lane — we verify the library compiles for the
      # iphonesimulator SDK but skip running the test binary. The test
      # logic is platform-independent and is already exercised on macOS,
      # so booting a simulator just to re-run it is pure CI cost.
      - name: Test
        if: ${{ !matrix.ios_build_only }}
        run: ctest --test-dir build --output-on-failure
