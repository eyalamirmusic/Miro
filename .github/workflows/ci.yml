name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows MSVC
            os: windows-latest
            cmake_configure_args: -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl

          - name: Windows Clang
            os: windows-latest
            cmake_configure_args: -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_COMPILER=clang-cl

          - name: macOS Universal
            os: macos-26
            cmake_configure_args: >
              -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
              -DCMAKE_OSX_DEPLOYMENT_TARGET=10.13

          - name: Linux Clang
            os: ubuntu-latest
            cmake_configure_args: -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++

          - name: Linux GCC
            os: ubuntu-latest
            cmake_configure_args: -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++

          - name: iOS
            os: macos-latest
            generator: Xcode
            cmake_configure_args: >
              -DCMAKE_SYSTEM_NAME=iOS
              -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0
            cmake_build_args: --config Release -- -sdk iphonesimulator
            ios_test: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@master

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: >
          cmake -B build
          -G ${{ matrix.generator || 'Ninja' }}
          ${{ matrix.generator == 'Xcode' && ' ' || '-DCMAKE_BUILD_TYPE=Release' }}
          ${{ matrix.cmake_configure_args }}

      - name: Build
        run: cmake --build build ${{ matrix.cmake_build_args }}

      - name: Test
        if: ${{ !matrix.ios_test }}
        run: ctest --test-dir build --output-on-failure

      - name: Test (iOS Simulator)
        if: ${{ matrix.ios_test }}
        run: |
          DEVICE=$(xcrun simctl list devices available -j | python3 -c "
          import sys, json
          devs = json.load(sys.stdin)['devices']
          print(next(d['udid'] for ds in devs.values() for d in ds if d['isAvailable'] and 'iPhone' in d['name']))
          ")
          xcrun simctl boot "$DEVICE"
          xcrun simctl spawn "$DEVICE" build/Tests/Release-iphonesimulator/MiroTests.app/MiroTests
          xcrun simctl shutdown "$DEVICE"
