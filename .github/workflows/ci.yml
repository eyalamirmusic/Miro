name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows MSVC
            os: windows-latest
            cmake_configure_args: -G "Visual Studio 17 2022"

          - name: Windows Clang
            os: windows-latest
            cmake_configure_args: -G "Visual Studio 17 2022" -T ClangCL

          - name: macOS Universal
            os: macos-latest
            cmake_configure_args: >
              -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
              -DCMAKE_OSX_DEPLOYMENT_TARGET=10.13

          - name: Linux Clang
            os: ubuntu-latest
            cmake_configure_args: -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++

          - name: Linux GCC
            os: ubuntu-latest
            cmake_configure_args: -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++

          - name: iOS
            os: macos-latest
            cmake_configure_args: >
              -G Xcode
              -DCMAKE_SYSTEM_NAME=iOS
              -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0
            cmake_build_args: -- -sdk iphonesimulator

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build ${{ matrix.cmake_configure_args }}

      - name: Build
        run: cmake --build build --config Release ${{ matrix.cmake_build_args }}

      - name: Test
        run: ctest --test-dir build --config Release --output-on-failure
